name: Frontend CI/CD

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: frontend-cicd-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/inventario-frontend

jobs:
  ci:
    runs-on: ubuntu-latest

    outputs:
      image-tag: ${{ steps.vars.outputs.sha_short }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set outputs
        id: vars
        run: echo "sha_short=$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run CI
        run: npm run check:ci

      - name: Upload dist artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist
          if-no-files-found: ignore

      - name: Upload coverage artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: coverage
          if-no-files-found: ignore

  build-and-push:
    needs: ci
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop') && false
    permissions:
      contents: read
      packages: write
    outputs:
      image-tag: ${{ needs.ci.outputs.image-tag }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ needs.ci.outputs.image-tag }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.ref_name }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  update-staging:
    needs: build-and-push
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/develop' && false

    steps:
      - name: Checkout infrastructure repo
        uses: actions/checkout@v5
        with:
          repository: your-org/inventario-infrastructure
          token: ${{ secrets.INFRA_PAT }}

      - name: Update staging frontend tag
        uses: mikefarah/yq@master
        with:
          cmd: yq e '.frontend.image.tag = "${{ needs.build-and-push.outputs.image-tag }}"' -i environments/staging/values.yaml

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add environments/staging/values.yaml
          git commit -m "chore(staging): frontend → ${{ needs.build-and-push.outputs.image-tag }}" || echo "No changes to commit"
          git push

  update-prod:
    needs: build-and-push
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && false
    environment: production

    steps:
      - name: Checkout infrastructure repo
        uses: actions/checkout@v5
        with:
          repository: your-org/inventario-infrastructure
          token: ${{ secrets.INFRA_PAT }}

      - name: Update prod frontend tag
        uses: mikefarah/yq@master
        with:
          cmd: yq e '.frontend.image.tag = "${{ needs.build-and-push.outputs.image-tag }}"' -i environments/prod/values.yaml

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add environments/prod/values.yaml
          git commit -m "chore(prod): frontend → ${{ needs.build-and-push.outputs.image-tag }}" || echo "No changes to commit"
          git push
