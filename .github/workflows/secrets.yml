name: Secret Scan

on:
  push:

permissions:
  contents: read

concurrency:
  group: secrets-${{ github.ref }}
  cancel-in-progress: true

jobs:
  gitleaks:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Run Gitleaks
        run: |
          docker run --rm \
            -v "$GITHUB_WORKSPACE:/path" \
            ghcr.io/gitleaks/gitleaks:latest \
            git -v /path
